<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chacha Chat - ログイン</title>
  <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
  <script src="app.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #13102d;
      color: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 20px;
    }
    .card {
      background: #1e1b3a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }
    .desc {
      text-align: center;
      color: #a1a1aa;
      font-size: .85rem;
      margin-bottom: 24px;
    }
    #login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 24px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 24px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .2s;
    }
    #login-btn:hover { opacity: .9; }
    #login-btn:disabled { opacity: .5; cursor: default; }
    #login-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    #status {
      text-align: center;
      font-size: .9rem;
      min-height: 1.4em;
      margin-top: 16px;
      color: #a1a1aa;
    }
    #status.error { color: #f87171; }
    #status.success { color: #4ade80; }
    .result-area { margin-top: 20px; }
    .result-area.hidden { display: none; }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 6px;
    }
    textarea {
      width: 100%;
      padding: 12px;
      background: #13102d;
      border: 1px solid #3f3a5e;
      border-radius: 8px;
      color: #e4e4e7;
      font-family: "SF Mono", "Monaco", "Cascadia Code", monospace;
      font-size: .8rem;
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }
    textarea:focus { outline: none; border-color: #6d28d9; }
    .copy-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: #6d28d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }
    .copy-btn:hover { background: #7c3aed; }
    .copy-btn.copied { background: #16a34a; }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #a1a1aa;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Chacha Chat</h1>
    <p class="desc">Google アカウントでログインして Refresh Token を取得します</p>
    <button id="login-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span>Google でログイン</span>
    </button>
    <div id="status"></div>
    <div class="result-area hidden" id="result-area">
      <label for="token">Refresh Token</label>
      <textarea id="token" readonly spellcheck="false"></textarea>
      <button class="copy-btn" id="copy-btn">コピー</button>
    </div>
  </div>
</body>
</html>
